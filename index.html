<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DataFlow — Visual self-service data transformation workflow builder. Drag-and-drop workflow canvas for non-technical users." />
  <meta name="theme-color" content="#012624" />

  <title>DataFlow — Visual Workflow Builder</title>

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Design Tokens + App Styles -->
  <link rel="stylesheet" href="css/tokens.css?v=9" />
  <link rel="stylesheet" href="css/app.css?v=9" />
</head>
<body>
  <!-- Particle canvas background -->
  <canvas id="particle-canvas" aria-hidden="true"></canvas>

  <!-- SPA root -->
  <div id="app-root">
    <!-- Loading state -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:24px;">
      <div style="width:48px;height:48px;color:#00827c;animation:spin 1.5s ease-in-out infinite;">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block; width:100%; height:100%;">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#bbc7c6;">Loading DataFlow…</div>
    </div>
  </div>

  <!-- Toast container (global fallback) -->
  <div class="toast-container" id="toast-container"></div>

  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Scripts (order matters — dependencies first) -->
  <script src="js/storage.js?v=9"></script>
  <script src="js/engine.js?v=9"></script>
  <script src="js/auth.js?v=9"></script>
  <script src="js/canvas.js?v=9"></script>
  <script src="js/admin.js?v=9"></script>
  <script src="js/viewer.js?v=9"></script>
  <script src="js/app.js?v=9"></script>
</body>
</html>
